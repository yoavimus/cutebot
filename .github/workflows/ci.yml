name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · Type · Test
    runs-on: ubuntu-latest

    # Postgres is only used by the migration drift check — tests stay on SQLite.
    # (Migrations are Postgres-flavored: 0002 uses ALTER COLUMN ... TYPE.)
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cutebot
          POSTGRES_PASSWORD: cutebot
          POSTGRES_DB: cutebot
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cutebot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Tests run against in-memory SQLite — no DB service needed.
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      APP_ENV: test
      DEFAULT_LLM_MODEL: "anthropic/claude-sonnet-4-6"
      ANTHROPIC_API_KEY: "sk-ci-placeholder"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Type check (mypy)
        run: python -m mypy app

      - name: Test
        run: python -m pytest -v

      - name: Migration drift check (alembic)
        env:
          DATABASE_URL: "postgresql+asyncpg://cutebot:cutebot@localhost:5432/cutebot"
        run: |
          python -m alembic upgrade head
          python -m alembic check
