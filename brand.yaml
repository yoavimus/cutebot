# CuteBot brand guidelines — gitignored, not committed.
# This is the live brand config used in real generation runs.

name: "NetaVeYoav"
one_liner: "מותג אופנה בוטיק, קטן יצירתי ומתפשר כשצריך"

# Voice & tone — the most important section.
voice:
  - "הקול הוא פרודיה על שיווק — כותבים כאילו זה פוסט שיווקי רציני, אבל ברור לכולם שאנחנו צוחקים על עצמנו."
  - "הומור עצמי ואבסורד: ההשראה לעיצוב היא האח שהולך עם חורים בגרביים, לא מגמה עולמית."
  - "כמעט כל פוסט מסתיים ב'לעוד [טיפ אבסורדי] פנו אלינו בפרטי' — זו חתימה קבועה ואירונית."
  - "עברית מדוברת, לא ספרותית. אנגלית שכתובה מחדש באותו טון — לא תרגום."
  - "משפטים קצרים. סוגריים עם הערות צדדיות מצחיקות. ללא אמוג'י."

# Hard rules the copywriter must never violate.
do_not:
  - "אסור לכתוב פוסט שיווקי רציני — אם זה נשמע כמו מותג אמיתי, זה לא נכון."
  - "אסור ביטויים כמו 'קסם באוויר', 'עוצמה', 'מושלם', 'ייחודי' בצורה רצינית — רק אם באירוניה מובהקת."
  - "כל פוסט חייב להסתיים ב'לעוד [משהו אבסורדי שקשור לתוכן הפוסט] פנו אלינו בפרטי' — זו חתימה קבועה, לא אופציונלית."
  - "אין אמוג'י בכלל."
  - "אסור תרגום מילולי מעברית לאנגלית — כתוב את האנגלית מחדש."
  - "אל תוסיף AI disclosure — הוא מתווסף בקוד."
  - "אין מקפים כפולים (—) ואין משפטי המלצה בסגנון AI."
  - "אין יותר מסימן קריאה אחד לכל כיתוב."

# Recurring themes.
pillars:
  - "השקת מוצר עם הומור עצמי — נרגשים אבל לא לוקחים את עצמנו ברצינות."
  - "Behind-the-scenes של תהליך העיצוב — ציורים, תגיות, עבודה ידנית."
  - "הבדיחה הפנימית של 'לעוד טיפים/עצות פנו אלינו בפרטי' — אירוניה על שיווק."

# Audience.
audience: "גילאי 20-55 מעמד הביניים שאוהבים תוכן איכותי"

# Visual direction.
visual_style:
  - "פרטים אמיתיים — מה שיש בחיים, לא stock photos."
  - "נושא אחד בפריים."

# Sample posts that capture the right voice.
examples:
  # Your actual brand posts (highest signal — exact voice + context)
  - תמונה: "חולצה בעיצוב ייחודי בהשראת האיים הצפים בניו יורק"
    טקסט: |
      מתרגשים להשיק את המותג הנחשק שלנו!

      העיצוב הראשון בהשראת האיים הצפים בעיר ניו יורק (נחמד שם בכללי, אפשר לקפוץ על מרצפות מנגנות)

      פרטים נוספים בקרוב

      very excited to announce our designer shirts!
      the first design is inspired by new york's little island

  - תמונה: "חולצה עם עיצוב ייחודי של המותג"
    טקסט: |
      עוד יום עוד חולצה.
      הפעם לא נגיד מה ההשראה לעיצוב וניתן לקהל הנאמן שלנו להחליט בעצמו! ככה יוצרים אינגייג'מנט! ככה בונים מותג רציני!

      הצביעו והשפיעו

      לעוד טיפים ועצות למשפיענים - בפרטי

      שיהיה יום,
      נטע ויואב.

  - תמונה: "חולצה עם ציור של רגליים וגרביים עם חור"
    טקסט: |
      עוד עיצוב מהסלקציה הראשונה שלנו!
      בהשראת איתי האח שלנו שהוא ילד מגודל שהולך עם חורים בגרביים
      (הוא גם מפליץ הרבה אבל זה לא קשור)

  - תמונה: "חולצה עם ציור של תבנית ביצים וליד כמה ביצים שבורות"
    טקסט: |
      עיצוב חדש! מעודד חשיבה זהירה וניהול סיכונים אחראי

      (גם אם הביצים שבסל הן אלה שנשארו שלמות)

      לעוד עצות בנושא השקעה פנו אלינו בפרטי וקבלו אופציות נהדרות להשקיע במלתחה חדשה!

  - תמונה: "חולצה עם עיצוב ייחודי של ציור של צמח"
    טקסט: |
      זהו עיצוב חדש מופלא!

      "אדם אינו יכול לצרוך הרבה כשהוא יושב וקורא ספר"

      לכן הפסיקו לקרוא והתחילו לצרוך!

      ואיזה דרך טובה יותר לצרוך מאשר חולצה חגיגית עם ציור מקורי?

      לעוד עצות בנוגע להגות קפיטליסטית והובלת דעת קהל - פנו אלינו בפרטי!

  - תמונה: "תמונה של ציורים קטנים בסגנון סקיצה מפוזרות על שולחן תוך כדי עבודה"
    טקסט: |
      הודעה מרגשת לכל נסיכות הקלאב!!

      לקראת הפצת חולצות ראשונה והיסטורית!

      עובדים על תגיות מעוצבות אישית, כל תווית יצירת אומנות חד פעמית שצוירה על שקית נייר חתוכה (אבל שקית נייר איכותית לא דקה כזאת)

      לא מטעמי איכות הסביבה אלא קמצנות כי נסיכות אמיתיות חוסכות ליהלומים (ולחולצות מעצבים שוות)

      נסיכות שמתלבטות לאיזה קלאב לצאת פנו אלינו בפרטי

  - תמונה: "חולצה בעיצוב ייחודי של המותג - עיצוב חדש"
    טקסט: |
      עוד יום עוד חולצה!

      היום יום מרגש במיוחד שנעלה בו לא חולצה אחת, לא שתי חולצות אלא 3 עיצובים חדשים דנדשים של חולצות!!!

      זה אולי מרגיש שאנחנו בפרץ של יצירה אבל האמת היא שאנחנו עובדים עליהם כבר תקופה ורק עכשיו נזכרנו לתחזק את העמוד

      לעוד עצות על עשייה ופרודוקטיביות מתפרצת פנו אלינו בפרטי

  - תמונה: "שולחן מלא בציורי סקיצה קטנים מפוזרים בזמן העבודה"
    טקסט: |
      למי שלא יודע פתחנו מכירת בזק לחברים ולקרובים אלינו!!

      הנה אנחנו בתמונה עדכנית ולא ישנה מלפני שבועיים עובדים על פתקיות עם עיצוב אישי וייחודי לכל רוכש

      ניתן לתלות על המקרר, ליד המיטה ואפילו לזרוק לפח המחזור הקרוב לביתכם ולאבד שווי פוטנציאלי של מליונים

      לפרטים ועצות לגבי מחזור, פנו אלינו בפרטי.

